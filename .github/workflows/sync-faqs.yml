name: Sync FAQs from Supabase

on:
  repository_dispatch:
    types:
      - faq-changed
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: sync-faqs
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run sync script
        env:
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: node scripts/sync-faqs.mjs

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sections/consultation.liquid sections/ingredient-checker.liquid
          if git diff --cached --quiet; then
            echo "No FAQ changes to commit."
            exit 0
          fi
          git commit -m "Sync FAQs from Supabase

Auto-generated by .github/workflows/sync-faqs.yml on faq-changed dispatch."
          git push
