<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" width="900" height="400">
  <defs>
    <!-- Shoulder fades -->
    <radialGradient id="sf1" cx="50%" cy="25%" rx="50%" ry="55%">
      <stop offset="0%" stop-color="#F5D5C4"/><stop offset="55%" stop-color="#F5D5C4"/>
      <stop offset="85%" stop-color="#F5D5C4" stop-opacity="0.4"/><stop offset="100%" stop-color="#F5D5C4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sf2" cx="50%" cy="25%" rx="50%" ry="55%">
      <stop offset="0%" stop-color="#D4A87A"/><stop offset="55%" stop-color="#D4A87A"/>
      <stop offset="85%" stop-color="#D4A87A" stop-opacity="0.4"/><stop offset="100%" stop-color="#D4A87A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sf3" cx="50%" cy="25%" rx="50%" ry="55%">
      <stop offset="0%" stop-color="#8B5E3C"/><stop offset="55%" stop-color="#8B5E3C"/>
      <stop offset="85%" stop-color="#8B5E3C" stop-opacity="0.4"/><stop offset="100%" stop-color="#8B5E3C" stop-opacity="0"/>
    </radialGradient>

    <!-- Single smooth face shading (light center, darker edges = soft 3D) -->
    <radialGradient id="fc1" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#FFF4ED" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#FAEADF" stop-opacity="0"/>
      <stop offset="100%" stop-color="#D4AA90" stop-opacity="0.3"/>
    </radialGradient>
    <radialGradient id="fc2" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#F0D4B4" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#E8C09A" stop-opacity="0"/>
      <stop offset="100%" stop-color="#A07850" stop-opacity="0.25"/>
    </radialGradient>
    <radialGradient id="fc3" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#B88860" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#A0704E" stop-opacity="0"/>
      <stop offset="100%" stop-color="#4A2E18" stop-opacity="0.25"/>
    </radialGradient>

    <!-- Soft cheek blush -->
    <radialGradient id="blush1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F0A0A0" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#F0A0A0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blush2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E08A7A" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#E08A7A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blush3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C07050" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#C07050" stop-opacity="0"/>
    </radialGradient>

    <!-- Head shape -->
    <path id="head" d="M0,-65 C38,-65 68,-42 70,-5 C72,18 68,40 58,55 C48,68 32,78 20,83 Q10,87 0,88 Q-10,87 -20,83 C-32,78 -48,68 -58,55 C-68,40 -72,18 -70,-5 C-68,-42 -38,-65 0,-65 Z"/>
    <!-- Hairline -->
    <path id="hl" d="M-72,35 C-76,10 -72,-18 -58,-35 C-44,-52 -26,-60 0,-62 C26,-60 44,-52 58,-35 C72,-18 76,10 72,35 L64,35 C64,8 58,-10 48,-22 C38,-32 22,-38 0,-40 C-22,-38 -38,-32 -48,-22 C-58,-10 -64,8 -64,35 Z"/>
    <!-- Ear -->
    <g id="ear"><ellipse cx="0" cy="0" rx="10" ry="16"/><ellipse cx="1" cy="0" rx="6" ry="10" opacity="0.12"/></g>
    <!-- Eye whites -->
    <g id="ew"><ellipse cx="-23" cy="0" rx="13" ry="9" fill="white"/><ellipse cx="23" cy="0" rx="13" ry="9" fill="white"/></g>
  </defs>

  <rect width="900" height="400" fill="white"/>

  <!-- ===== FIGURE 1: Light ===== -->
  <g transform="translate(150, 15)">
    <!-- Shoulders -->
    <ellipse cx="0" cy="320" rx="130" ry="80" fill="url(#sf1)"/>
    <!-- Neck -->
    <path d="M-22,225 C-23,240 -28,258 -38,278 L38,278 C28,258 23,240 22,225 Z" fill="#F5D5C4"/>
    <ellipse cx="0" cy="230" rx="20" ry="8" fill="#DDBFAA" opacity="0.12"/>
    <!-- Hair back -->
    <ellipse cx="0" cy="110" rx="74" ry="80" fill="#6B4228"/>
    <!-- Head -->
    <g transform="translate(0, 145)"><use href="#head" fill="#FAEADF"/></g>
    <!-- Smooth face shading overlay -->
    <g transform="translate(0, 145)"><use href="#head" fill="url(#fc1)"/></g>
    <!-- Ears -->
    <g transform="translate(-68, 148)"><use href="#ear" fill="#F0D0BC"/></g>
    <g transform="translate(68, 148) scale(-1,1)"><use href="#ear" fill="#F0D0BC"/></g>
    <!-- Hair front + bun -->
    <g transform="translate(0, 118)"><use href="#hl" fill="#6B4228"/></g>
    <ellipse cx="0" cy="48" rx="27" ry="29" fill="#6B4228"/>
    <ellipse cx="0" cy="73" rx="16" ry="4.5" fill="#E8E0D8" opacity="0.75"/>

    <!-- Eyebrows -->
    <path d="M-34,133 Q-23,126 -10,129" stroke="#6B4228" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M34,133 Q23,126 10,129" stroke="#6B4228" stroke-width="2.5" fill="none" stroke-linecap="round"/>

    <!-- Eyes -->
    <g transform="translate(0, 148)">
      <use href="#ew"/>
      <!-- Iris -->
      <circle cx="-23" cy="1" r="7" fill="#6B5040"/>
      <circle cx="23" cy="1" r="7" fill="#6B5040"/>
      <!-- Pupil -->
      <circle cx="-23" cy="0.5" r="3.5" fill="#1A1008"/>
      <circle cx="23" cy="0.5" r="3.5" fill="#1A1008"/>
      <!-- Catchlight -->
      <circle cx="-21" cy="-1.5" r="1.8" fill="white"/>
      <circle cx="25" cy="-1.5" r="1.8" fill="white"/>
      <!-- Upper eyelid -->
      <path d="M-36,-0.5 Q-23,-7.5 -10,-0.5" stroke="#5C3A1E" stroke-width="2" fill="none"/>
      <path d="M36,-0.5 Q23,-7.5 10,-0.5" stroke="#5C3A1E" stroke-width="2" fill="none"/>
      <!-- Eyelid crease (very subtle) -->
      <path d="M-33,-5 Q-23,-10 -13,-5" stroke="#DDBFAA" stroke-width="0.7" fill="none" opacity="0.4"/>
      <path d="M33,-5 Q23,-10 13,-5" stroke="#DDBFAA" stroke-width="0.7" fill="none" opacity="0.4"/>
    </g>

    <!-- Nose (minimal — just bottom hint) -->
    <path d="M-7,182 Q-4,186 0,186 Q4,186 7,182" stroke="#DDBFAA" stroke-width="1" fill="none" opacity="0.5"/>
    <ellipse cx="-4.5" cy="183" rx="2.5" ry="1.5" fill="#DDBFAA" opacity="0.2"/>
    <ellipse cx="4.5" cy="183" rx="2.5" ry="1.5" fill="#DDBFAA" opacity="0.2"/>

    <!-- Cheek blush -->
    <ellipse cx="-32" cy="174" rx="20" ry="14" fill="url(#blush1)"/>
    <ellipse cx="32" cy="174" rx="20" ry="14" fill="url(#blush1)"/>

    <!-- Lips -->
    <g transform="translate(0, 196)">
      <!-- Upper lip -->
      <path d="M-15,0 Q-10,-5 -4,-2.5 Q0,-6 4,-2.5 Q10,-5 15,0 Z" fill="#E8918A"/>
      <!-- Lower lip -->
      <path d="M-14,0.5 Q-7,10 0,9 Q7,10 14,0.5 Z" fill="#D87A72"/>
      <!-- Lower lip highlight -->
      <ellipse cx="0" cy="5" rx="6" ry="2.5" fill="white" opacity="0.1"/>
    </g>
  </g>

  <!-- ===== FIGURE 2: Medium ===== -->
  <g transform="translate(450, 15)">
    <ellipse cx="0" cy="320" rx="130" ry="80" fill="url(#sf2)"/>
    <path d="M-22,225 C-23,240 -28,258 -38,278 L38,278 C28,258 23,240 22,225 Z" fill="#D4A87A"/>
    <ellipse cx="0" cy="230" rx="20" ry="8" fill="#B88A60" opacity="0.12"/>
    <ellipse cx="0" cy="110" rx="74" ry="80" fill="#3D2210"/>
    <g transform="translate(0, 145)"><use href="#head" fill="#E8C09A"/></g>
    <g transform="translate(0, 145)"><use href="#head" fill="url(#fc2)"/></g>
    <g transform="translate(-68, 148)"><use href="#ear" fill="#D4A87A"/></g>
    <g transform="translate(68, 148) scale(-1,1)"><use href="#ear" fill="#D4A87A"/></g>
    <g transform="translate(0, 118)"><use href="#hl" fill="#3D2210"/></g>
    <ellipse cx="0" cy="48" rx="27" ry="29" fill="#3D2210"/>
    <ellipse cx="0" cy="73" rx="16" ry="4.5" fill="#C8B8A8" opacity="0.75"/>

    <path d="M-34,133 Q-23,126 -10,129" stroke="#3D2210" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M34,133 Q23,126 10,129" stroke="#3D2210" stroke-width="2.5" fill="none" stroke-linecap="round"/>

    <g transform="translate(0, 148)">
      <use href="#ew"/>
      <circle cx="-23" cy="1" r="7" fill="#4A3020"/>
      <circle cx="23" cy="1" r="7" fill="#4A3020"/>
      <circle cx="-23" cy="0.5" r="3.5" fill="#1A1008"/>
      <circle cx="23" cy="0.5" r="3.5" fill="#1A1008"/>
      <circle cx="-21" cy="-1.5" r="1.8" fill="white"/>
      <circle cx="25" cy="-1.5" r="1.8" fill="white"/>
      <path d="M-36,-0.5 Q-23,-7.5 -10,-0.5" stroke="#3D2210" stroke-width="2" fill="none"/>
      <path d="M36,-0.5 Q23,-7.5 10,-0.5" stroke="#3D2210" stroke-width="2" fill="none"/>
      <path d="M-33,-5 Q-23,-10 -13,-5" stroke="#C09060" stroke-width="0.7" fill="none" opacity="0.35"/>
      <path d="M33,-5 Q23,-10 13,-5" stroke="#C09060" stroke-width="0.7" fill="none" opacity="0.35"/>
    </g>

    <path d="M-7,182 Q-4,186 0,186 Q4,186 7,182" stroke="#B08050" stroke-width="1" fill="none" opacity="0.45"/>
    <ellipse cx="-4.5" cy="183" rx="2.5" ry="1.5" fill="#B08050" opacity="0.18"/>
    <ellipse cx="4.5" cy="183" rx="2.5" ry="1.5" fill="#B08050" opacity="0.18"/>

    <ellipse cx="-32" cy="174" rx="20" ry="14" fill="url(#blush2)"/>
    <ellipse cx="32" cy="174" rx="20" ry="14" fill="url(#blush2)"/>

    <g transform="translate(0, 196)">
      <path d="M-15,0 Q-10,-5 -4,-2.5 Q0,-6 4,-2.5 Q10,-5 15,0 Z" fill="#D47A6A"/>
      <path d="M-14,0.5 Q-7,10 0,9 Q7,10 14,0.5 Z" fill="#C06858"/>
      <ellipse cx="0" cy="5" rx="6" ry="2.5" fill="white" opacity="0.07"/>
    </g>
  </g>

  <!-- ===== FIGURE 3: Dark ===== -->
  <g transform="translate(750, 15)">
    <ellipse cx="0" cy="320" rx="130" ry="80" fill="url(#sf3)"/>
    <path d="M-22,225 C-23,240 -28,258 -38,278 L38,278 C28,258 23,240 22,225 Z" fill="#8B5E3C"/>
    <ellipse cx="0" cy="230" rx="20" ry="8" fill="#5A3820" opacity="0.12"/>
    <ellipse cx="0" cy="110" rx="74" ry="80" fill="#141414"/>
    <g transform="translate(0, 145)"><use href="#head" fill="#A0704E"/></g>
    <g transform="translate(0, 145)"><use href="#head" fill="url(#fc3)"/></g>
    <g transform="translate(-68, 148)"><use href="#ear" fill="#8B5E3C"/></g>
    <g transform="translate(68, 148) scale(-1,1)"><use href="#ear" fill="#8B5E3C"/></g>
    <g transform="translate(0, 118)"><use href="#hl" fill="#141414"/></g>
    <ellipse cx="0" cy="48" rx="27" ry="29" fill="#141414"/>
    <ellipse cx="0" cy="73" rx="16" ry="4.5" fill="#D0D0D0" opacity="0.65"/>

    <path d="M-34,133 Q-23,126 -10,129" stroke="#141414" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M34,133 Q23,126 10,129" stroke="#141414" stroke-width="2.5" fill="none" stroke-linecap="round"/>

    <g transform="translate(0, 148)">
      <use href="#ew"/>
      <circle cx="-23" cy="1" r="7" fill="#3A2515"/>
      <circle cx="23" cy="1" r="7" fill="#3A2515"/>
      <circle cx="-23" cy="0.5" r="3.5" fill="#0A0808"/>
      <circle cx="23" cy="0.5" r="3.5" fill="#0A0808"/>
      <circle cx="-21" cy="-1.5" r="1.8" fill="white"/>
      <circle cx="25" cy="-1.5" r="1.8" fill="white"/>
      <path d="M-36,-0.5 Q-23,-7.5 -10,-0.5" stroke="#141414" stroke-width="2" fill="none"/>
      <path d="M36,-0.5 Q23,-7.5 10,-0.5" stroke="#141414" stroke-width="2" fill="none"/>
      <path d="M-33,-5 Q-23,-10 -13,-5" stroke="#6B4228" stroke-width="0.7" fill="none" opacity="0.3"/>
      <path d="M33,-5 Q23,-10 13,-5" stroke="#6B4228" stroke-width="0.7" fill="none" opacity="0.3"/>
    </g>

    <path d="M-7,182 Q-4,186 0,186 Q4,186 7,182" stroke="#5A3820" stroke-width="1" fill="none" opacity="0.4"/>
    <ellipse cx="-4.5" cy="183" rx="2.5" ry="1.5" fill="#5A3820" opacity="0.15"/>
    <ellipse cx="4.5" cy="183" rx="2.5" ry="1.5" fill="#5A3820" opacity="0.15"/>

    <ellipse cx="-32" cy="174" rx="20" ry="14" fill="url(#blush3)"/>
    <ellipse cx="32" cy="174" rx="20" ry="14" fill="url(#blush3)"/>

    <g transform="translate(0, 196)">
      <path d="M-15,0 Q-10,-5 -4,-2.5 Q0,-6 4,-2.5 Q10,-5 15,0 Z" fill="#8C4A3A"/>
      <path d="M-14,0.5 Q-7,10 0,9 Q7,10 14,0.5 Z" fill="#6E3828"/>
      <ellipse cx="0" cy="5" rx="6" ry="2.5" fill="white" opacity="0.04"/>
    </g>
  </g>
</svg>